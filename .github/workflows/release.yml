name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static binary
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            crystallang/crystal:latest-alpine \
            sh -c "mkdir -p bin && shards install --production && crystal build src/main.cr -o bin/garm-provider-vultr --release --static --no-debug && strip bin/garm-provider-vultr"

      - name: Package binary
        run: |
          mkdir -p dist
          tar czf dist/garm-provider-vultr-linux-amd64.tar.gz -C bin garm-provider-vultr
          sha256sum dist/garm-provider-vultr-linux-amd64.tar.gz > dist/garm-provider-vultr-linux-amd64.tar.gz.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/garm-provider-vultr-linux-amd64.tar.gz
            dist/garm-provider-vultr-linux-amd64.tar.gz.sha256
